name: pharma_care
description: PharmaCare - Complete Pharmacy Management App

publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Architecture
  flutter_riverpod: ^2.5.1
  dartz: ^0.10.1
  equatable: ^2.0.5

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3

  # Navigation
  go_router: ^14.2.7

  # Local storage
  shared_preferences: ^2.2.3

  # PDF
  pdf: ^3.11.1
  printing: ^5.13.1
  open_file: ^3.3.2

  # Charts
  fl_chart: ^0.69.0

  # File handling
  path_provider: ^2.1.3
  share_plus: ^9.0.0

  # Scanner
  mobile_scanner: ^5.2.3

  # Notifications
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4

  # Voice
  speech_to_text: ^6.6.2

  # Excel export
  excel: ^4.0.6

  # Permissions
  permission_handler: ^11.3.1

  # Utils
  intl: ^0.19.0

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true